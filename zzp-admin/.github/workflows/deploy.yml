name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Dependencies installeren
        run: npm ci

      - name: Bouwen
        run: npm run build

      - name: GitHub Pages configureren
        uses: actions/configure-pages@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Artifact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
