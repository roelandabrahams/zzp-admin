name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Bouwen
        run: npm run build

      - name: GitHub Pages configureren
        uses: actions/configure-pages@v4

      - name: Artifact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
